name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff

      - name: Check for credentials in source
        run: |
          if grep -rE '(password|secret|token)\s*[:=]\s*["'\''][^"'\'']{8,}' \
            --include='*.py' --include='*.json' --include='*.md' \
            --exclude='README.md' \
            --exclude-dir='.git' --exclude-dir='.browser-data' .; then
            echo "::error::Possible credentials found in source files"
            exit 1
          fi

      - name: Check .env.example for real credentials
        run: |
          if grep -E '^TYLERRAW_PASSWORD=.+' .env.example | grep -vE '(your-password|example|changeme|xxx)'; then
            echo "::error::Possible real password in .env.example"
            exit 1
          fi
          if grep -E '^TYLERRAW_EMAIL=.+' .env.example | grep -vE '(example\.com|your-email|changeme|xxx)'; then
            echo "::error::Possible real email in .env.example"
            exit 1
          fi

      - name: Syntax check
        run: python -m py_compile download_videos.py

      - name: Lint with ruff
        run: ruff check download_videos.py

      - name: Check dependency compatibility
        run: pip check
